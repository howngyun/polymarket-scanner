name: Weather Bot (paper)

on:
  schedule:
    - cron: "*/5 * * * *"   # 5분마다 (Patch P3 — basic 5-min loop)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weatherbot
  cancel-in-progress: false   # SQLite ledger 손상 방지

jobs:
  weatherbot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      PYTHONPATH: ${{ github.workspace }}
      # W1/W2 페이퍼 전용. W3에서 라이브 시 토큰 추가.
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: weatherbot/requirements.txt

      - name: Install deps
        run: pip install -r weatherbot/requirements.txt

      - name: Run weatherbot once (paper)
        run: python -m weatherbot.runner

      - name: Commit ledger
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add weatherbot/paper.db
          if git diff --cached --quiet; then
            echo "ledger unchanged"
            exit 0
          fi
          git commit -m "weatherbot: $(date -u '+%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            if git pull --rebase -X theirs --autostash origin main && git push; then
              echo "push ok (try $i)"
              exit 0
            fi
            echo "push retry $i/5"
            sleep $((i*3))
          done
          echo "push failed"
          exit 1
