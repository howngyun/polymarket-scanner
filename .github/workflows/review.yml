name: Claude Daily Review

on:
  schedule:
    - cron: "0 23 * * *"   # UTC 23:00 = KST 08:00 (매일 1회)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: review
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run Claude daily review
        run: python monitor/claude_review.py

      - name: Commit review
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "변경 없음, 스킵"
            exit 0
          fi
          git commit -m "review: $(date -u '+%Y-%m-%d')"
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push; then
              echo "push 성공"
              exit 0
            fi
            sleep $((i*3))
          done
          exit 1
