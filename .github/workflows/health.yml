name: Health Check

on:
  schedule:
    - cron: "15 * * * *"   # 매 시간 15분에 실행 (다른 워크플로우와 겹치지 않게)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: health
  cancel-in-progress: false

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run health check
        run: python monitor/health_check.py

      - name: Regenerate dashboard
        run: python scanner/dashboard.py

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "변경 없음, 스킵"
            exit 0
          fi
          git commit -m "health: $(date -u '+%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push; then
              echo "push 성공"
              exit 0
            fi
            sleep $((i*3))
          done
          exit 1
