name: Telegram Test
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Send test message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=✅ 폴리마켓 봇 텔레그램 연결 확인! BTC: $(curl -s 'https://api.kraken.com/0/public/Ticker?pair=XBTUSD' | python3 -c 'import sys,json; d=json.load(sys.stdin); print(float(list(d["result"].values())[0]["c"][0]))')" \
            -d "parse_mode=HTML"
